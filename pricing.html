<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARIE — Съёмка</title>
  <link rel="icon" href="icons/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pricing.css">
</head>
<body>

  <div id="cursor">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <line x1="14" y1="0" x2="14" y2="10" stroke="#E8001D" stroke-width="1.5"/>
      <line x1="14" y1="18" x2="14" y2="28" stroke="#E8001D" stroke-width="1.5"/>
      <line x1="0" y1="14" x2="10" y2="14" stroke="#E8001D" stroke-width="1.5"/>
      <line x1="18" y1="14" x2="28" y2="14" stroke="#E8001D" stroke-width="1.5"/>
      <circle id="cursor-dot" cx="14" cy="14" r="2.5" fill="#E8001D"/>
    </svg>
  </div>

  <nav id="main-nav">
    <div class="nav-left">
      <span class="nav-sub">prod by</span>
      <a href="index.html" class="nav-logo">MARIE</a>
    </div>
    <div class="nav-links">
      <a href="index.html">WORK</a>
      <a href="pricing.html" class="active">PRICES</a>
      <a href="about.html">ABOUT</a>
    </div>
  </nav>

  <div class="pricing-wrap">
    <div class="pricing-hero">
      <div class="pricing-title">СЪЁМКА</div>
      <p class="pricing-lead">Снимаю людей такими, какие они есть —<br>без постановки, без напряжения.<br>Только живые кадры.</p>
    </div>
    <div class="pricing-grid"></div>
    <div class="pricing-how">
      <div class="pricing-how-title">КАК ЭТО РАБОТАЕТ</div>
      <ol class="pricing-steps">
        <li>Пишешь мне</li>
        <li>Обсуждаем идею и локацию</li>
        <li>Снимаем</li>
        <li>Получаешь готовые файлы</li>
      </ol>
    </div>
    <div class="pricing-cta">
      <a href="https://t.me/miinaeva" class="pricing-btn" target="_blank" rel="noopener">написать мне</a>
    </div>
  </div>

  <footer class="site-footer">
    <div class="site-footer-name">MARIE</div>
    <div class="site-footer-links">
      <a href="mailto:minaevamarie@gmail.com">minaevamarie@gmail.com</a>
      <a href="https://www.instagram.com/miinaeva/" target="_blank" rel="noopener">@miinaeva</a>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 30);
    }, { passive: true });

    const cursor = document.getElementById('cursor');
    let mx = -100, my = -100, cx = -100, cy = -100;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function raf() {
      cx += (mx - cx) * 0.18;
      cy += (my - cy) * 0.18;
      cursor.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
      requestAnimationFrame(raf);
    })();
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });
  </script>
  <script src="grain.js"></script>
  <script src="pricing.js"></script>
</body>
</html>
